name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Install dependencies
        run: npm ci

      - name: Test Angular
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox

      - name: Test Supabase Edge Functions
        run: npm run test:supabase:functions

      - name: Build Angular
        run: npm run build -- --base-href=/creator-flow/ --deploy-url=/creator-flow/

      - name: Create SPA fallback
        run: cp dist/creator-flow/browser/index.html dist/creator-flow/browser/404.html

      - name: Install ripgrep
        run: command -v rg || (sudo apt-get update && sudo apt-get install -y ripgrep)

      - name: Check bundle for secrets
        run: |
          if rg -i "service_role|GOOGLE_CLIENT_SECRET|client_secret=|refresh_token=" dist; then
            echo "::error::Potential secret found in the production bundle."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/creator-flow/browser

  deploy-supabase:
    name: Deploy Supabase
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: supabase-production

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Link Supabase project
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply Supabase migrations
        run: npx supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Deploy Supabase Edge Functions
        run: npx supabase functions deploy youtube-oauth-start youtube-oauth-callback youtube-sync-comments --project-ref "$SUPABASE_PROJECT_REF"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy-supabase

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
