<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/comments" aria-label="Creator Flow">
      <img src="/creator-flow-logo.webp" alt="" class="brand-logo" width="32" height="32" />
      <span>Creator Flow</span>
    </a>

    <nav class="nav" aria-label="Navegacao principal">
      <a routerLink="/connect-youtube" routerLinkActive="active">YouTube</a>
      <a routerLink="/comments" routerLinkActive="active">Comentarios</a>
      <a routerLink="/scripts" routerLinkActive="active">Roteiros</a>
    </nav>

    <div class="session-actions">
      @if (user()?.email) {
        <span class="user-email">{{ user()?.email }}</span>
      }
      <button class="sign-out" type="button" [disabled]="loading()" (click)="signOut()">
        Sair
      </button>
    </div>
  </header>

  @if (authError()) {
    <p class="shell-error" role="alert">{{ authError() }}</p>
  }

  <main class="content">
    <router-outlet />
  </main>
</div>
